name: Build unsigned IPA
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app (plain build, no archive)
        run: |
          mkdir -p build/Products
          xcodebuild -project BeelineNavi.xcodeproj \
            -scheme BeelineNavi \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CONFIGURATION_BUILD_DIR=$(pwd)/build/Products \
            build 2>&1 | tee full_build.log
          echo "=== VSECHNY operace tykajici se Info.plist, v poradi ==="
          grep -n -i "info.plist" full_build.log

      - name: Verify bundled Info.plist has our keys
        run: |
          plutil -p build/Products/BeelineNavi.app/Info.plist

      - name: Package .app into unsigned .ipa
        run: |
          mkdir -p build/Payload
          cp -r build/Products/BeelineNavi.app build/Payload/
          cd build && zip -r BeelineNavi-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeelineNavi-unsigned-ipa
          path: build/BeelineNavi-unsigned.ipa
