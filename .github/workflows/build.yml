name: Build unsigned IPA
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Debug - list repo files
        run: |
          echo "--- Obsah repozitare ---"
          ls -la
          echo "--- Obsah Info.plist (pokud existuje) ---"
          cat Info.plist || echo "Info.plist NENALEZEN v rootu repa!"

      - name: Install XcodeGen
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml

      - name: Debug - show INFOPLIST settings in generated project
        run: |
          grep -A2 "INFOPLIST" BeelineNavi.xcodeproj/project.pbxproj || echo "INFOPLIST klic nenalezen v project.pbxproj"

      - name: Debug - show resolved build settings
        run: |
          xcodebuild -project BeelineNavi.xcodeproj \
            -scheme BeelineNavi \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -showBuildSettings | grep -i -E "infoplist|srcroot|^\s*PROJECT_DIR"

      - name: Build unsigned .app (Simulator-Generic, no signing)
        run: |
          xcodebuild -project BeelineNavi.xcodeproj \
            -scheme BeelineNavi \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive -archivePath build/BeelineNavi.xcarchive

      - name: Debug - find all Info.plist files in DerivedData
        run: |
          find ~/Library/Developer/Xcode/DerivedData -iname "*info.plist" 2>/dev/null | while read f; do
            echo "=== $f ==="
            plutil -p "$f" 2>/dev/null || cat "$f"
          done

      - name: Debug - print bundled Info.plist
        run: |
          plutil -p build/BeelineNavi.xcarchive/Products/Applications/BeelineNavi.app/Info.plist

      - name: Package .app into unsigned .ipa
        run: |
          mkdir -p build/Payload
          cp -r build/BeelineNavi.xcarchive/Products/Applications/BeelineNavi.app build/Payload/
          cd build && zip -r BeelineNavi-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeelineNavi-unsigned-ipa
          path: build/BeelineNavi-unsigned.ipa
