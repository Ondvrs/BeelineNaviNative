name: Build unsigned IPA
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  build:
    runs-on: macos-15
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Warm-up build (primes Info.plist processing, ignore result)
        run: |
          xcodebuild -project BeelineNavi.xcodeproj \
            -scheme BeelineNavi \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive -archivePath build/_warmup.xcarchive || true

      - name: Build unsigned .app (real archive)
        run: |
          xcodebuild -project BeelineNavi.xcodeproj \
            -scheme BeelineNavi \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            archive -archivePath build/BeelineNavi.xcarchive

      - name: Verify bundled Info.plist has our keys
        run: |
          plutil -p build/BeelineNavi.xcarchive/Products/Applications/BeelineNavi.app/Info.plist

      - name: Package .app into unsigned .ipa
        run: |
          mkdir -p build/Payload
          cp -r build/BeelineNavi.xcarchive/Products/Applications/BeelineNavi.app build/Payload/
          cd build && zip -r BeelineNavi-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BeelineNavi-unsigned-ipa
          path: build/BeelineNavi-unsigned.ipa
