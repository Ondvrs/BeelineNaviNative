name: BeelineNavi
options:
  bundleIdPrefix: com.olepe
targets:
  BeelineNavi:
    type: application
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "README.md"
          - ".github/**"
          - "BeelineNaviWidget/**"
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "Beeline Navi"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSLocationWhenInUseUsageDescription: "Aplikace potrebuje polohu pro vypocet smeru k cili."
        NSLocationAlwaysAndWhenInUseUsageDescription: "Aplikace potrebuje polohu na pozadi, aby navigace fungovala i se zamceným telefonem."
        NSBluetoothAlwaysUsageDescription: "Aplikace potrebuje Bluetooth pro komunikaci s ESP32 navigacnim displejem."
        UIBackgroundModes: [location, bluetooth-central]
        UILaunchScreen: {}
        NSSupportsLiveActivities: true
    dependencies:
      - sdk: MapKit.framework
      - target: BeelineNaviWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olepe.beelinenavi
        INFOPLIST_FILE: Info.plist
        GENERATE_INFOPLIST_FILE: NO

  BeelineNaviWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: BeelineNaviWidget
      - path: BeelineActivityAttributes.swift
    info:
      path: BeelineNaviWidget/Info.plist
      properties:
        CFBundleDisplayName: "Beeline Navi Widget"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olepe.beelinenavi.widget
        INFOPLIST_FILE: BeelineNaviWidget/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
