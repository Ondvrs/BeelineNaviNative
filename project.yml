name: BeelineNavi
options:
  bundleIdPrefix: com.olepe.beelinenavi
  deploymentTarget:
    iOS: "16.0"

targets:
  BeelineNavi:
    type: application
    platform: iOS
    sources:
      - path: ContentView.swift
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.olepe.beelinenavi
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        SWIFT_VERSION: 5.0
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
